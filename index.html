<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Salary Request</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            margin-top: 100px;
        }

        h1 {
            font-size: 30px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
        }

        #noBtn {
            position: absolute;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<h1>Arslan Bhai 😄<br>Salary barhani hai ya nahi?</h1>

<button onclick="showOptions()">Yes</button>
<button id="noBtn" onmouseover="moveButton()">No</button>

<div id="options" class="hidden">
    <h2>Select increment:</h2>
    <button onclick="happy()">10%</button>
    <button onclick="happy()">20%</button>
    <button onclick="happy()">30%</button>
</div>

<div id="result" class="hidden">
    <h1>🎉 😍 🎉</h1>
    <h2>Thank You Boss ❤️</h2>
</div>

<script>
function moveButton() {
    let x = Math.random() * window.innerWidth - 100;
    let y = Math.random() * window.innerHeight - 50;

    let btn = document.getElementById("noBtn");
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

function showOptions() {
    document.getElementById("options").classList.remove("hidden");
}

function happy() {
    document.getElementById("result").classList.remove("hidden");
}
</script>

</body>
</html>
